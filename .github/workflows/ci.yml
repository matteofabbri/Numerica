name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Numerica.slnx

      - name: Build
        run: dotnet build Numerica.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Numerica.slnx -c Release --no-build --verbosity normal
